syntax = "proto3";

package playlist;

import "google/api/annotations.proto";

option go_package = "/playlist";

service PlaylistService {
  rpc Create(CreatePlaylistRequest) returns (CreatePlaylistResponse) {
    option (google.api.http) = {
      post: "/playlists"
      body: "*"
    };
  }

  rpc GetPlaylist(GetPlaylistRequest) returns (GetPlaylistResponse) {
    option (google.api.http) = {get: "/playlists/{id}"};
  }

  rpc UpdatePlaylist(UpdatePlaylistRequest) returns (UpdatePlaylistResponse) {
    option (google.api.http) = {
      put: "/playlists/{id}"
      body: "*"
    };
  }

  rpc DeletePlaylist(DeletePlaylistRequest) returns (DeletePlaylistResponse) {
    option (google.api.http) = {delete: "/playlists/{id}"};
  }

  rpc AddTrackToPlaylist(AddTrackRequest) returns (AddTrackResponse) {
    option (google.api.http) = {
      post: "/playlists/{id}/tracks"
      body: "*"
    };
  }

  rpc RemoveTrackFromPlaylist(RemoveTrackToPlaylistRequest) returns (RemoveTrackToPlaylistResponse) {
    option (google.api.http) = {delete: "/playlists/{id}/tracks/{trackId}"};
  }
}

message Playlist {
  int64 id = 1;
  int64 userId = 2;
  string title = 3;
}

message PlaylistTrack {
  int64 playlistId = 1;
  int64 trackId = 2;
}

message CreatePlaylistRequest {
  int64 userId = 1;
  string title = 2;
}

message CreatePlaylistResponse {
  int64 id = 1;
}

message GetPlaylistRequest {
  int64 id = 1;
}

message GetPlaylistResponse {
  Playlist playlist = 1;
}

message UpdatePlaylistRequest {
  int64 id = 1;
  string title = 2;
}

message UpdatePlaylistResponse {
  Playlist playlist = 1;
}

message DeletePlaylistRequest {
  int64 id = 1;
}

message DeletePlaylistResponse {
  bool success = 1;
}

message AddTrackRequest {
  int64 id = 1;
  int64 trackId = 2;
  int64 position = 3;
}

message RemoveTrackToPlaylistRequest {
  int64 id = 1;
  int64 trackId = 2;
}

message AddTrackResponse {
  int64 id = 1;
}

message RemoveTrackToPlaylistResponse {
  int64 id = 1;
}
