syntax = "proto3";

package streaming;

import "google/api/annotations.proto";

option go_package = "/streaming";

service StreamingService {
  // Получение аудио-потока для стриминга
  rpc StreamTrack(StreamRequest) returns (stream Chunk) {
    option (google.api.http) = {get: "/stream/{id}"};
  }
}

message Track {
  int64 id = 1;
  string title = 2;
  string artistId = 3;
  string url = 4;
  int64 duration = 5;
  string mimeType = 6;
}

message StreamRequest {
  int64 id = 1;
  int64 startPosition = 2;
  int64 chunkSize = 3;
}

message StreamResponse {
  Track track = 1;
}

message Chunk {
  bytes data = 1;
  int64 position = 2;
  bool isLast = 3;
  string mimeType = 4;
  int64 totalSize = 5;
}
