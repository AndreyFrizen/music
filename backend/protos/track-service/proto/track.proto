syntax = "proto3";

package track;

import "google/api/annotations.proto";

option go_package = "/track";

service TrackService {
  rpc CreateTrack(stream CreateTrackRequest) returns (CreateTrackResponse) {
    option (google.api.http) = {
      post: "/tracks"
      body: "*"
    };
  }
  rpc GetTrack(GetTrackRequest) returns (GetTrackResponse) {
    option (google.api.http) = {get: "/tracks/{id}"};
  }
  rpc UpdateTrack(UpdateTrackRequest) returns (UpdateTrackResponse) {
    option (google.api.http) = {
      patch: "/tracks/{track.id}"
      body: "*"
    };
  }
  rpc DeleteTrack(DeleteTrackRequest) returns (DeleteTrackResponse) {
    option (google.api.http) = {delete: "/tracks/{id}"};
  }
}

message Track {
  int64 id = 1;
  string title = 2;
  int64 duration = 3;
  int64 artistId = 5;
  int64 albumId = 6;
  string audioUrl = 7;
}

message NewTrack {
  string title = 1;
  int64 duration = 2;
  int64 artistId = 3;
  int64 albumId = 4;
}

message CreateTrackRequest {
  oneof data {
    NewTrack track = 1;
    bytes chunk = 2;
  }
}

message CreateTrackResponse {
  int64 id = 1;
}

message GetTrackRequest {
  int64 id = 1;
}

message GetTrackResponse {
  Track track = 1;
}

message UpdateTrackRequest {
  Track track = 1;
}

message UpdateTrackResponse {
  Track track = 1;
}

message DeleteTrackRequest {
  int64 id = 1;
}

message DeleteTrackResponse {
  bool success = 1;
}
