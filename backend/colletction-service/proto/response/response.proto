syntax = "proto3";

package response;

import "models/models.proto";

option go_package = "collection-service/proto/response;response";

// Album requests
message GetAlbumsResponse {
  repeated models.Album albums = 1;
}

message AddAlbumResponse {
  int64 album_id = 2;
}

message DeleteAlbumResponse {
  int64 album_id = 2;
}

// Artist requests
message AddArtistResponse {
  int64 artist_id = 2;
}

message GetArtistsResponse {
  repeated models.Artist artists = 1;
}

message DeleteArtistResponse {
  int64 artist_id = 2;
}

// Track requests
message AddTrackResponse {
  int64 track_id = 2;
}

message GetTracksResponse {
  repeated models.Track tracks = 1;
}

message DeleteTrackResponse {
  int64 track_id = 2;
}
