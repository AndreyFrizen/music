syntax = "proto3";

package collection;

import "google/api/annotations.proto";

option go_package = "/collection";

service UserService {
  rpc GetTracksCollection(GetTracksRequest) returns (GetTracksResponse) {
    option (google.api.http) = {
      get: "/track_collection"
      body: "*"
    };
  }
  rpc GetAlbumsCollection(GetAlbumsRequest) returns (GetAlbumsResponse) {
    option (google.api.http) = {
      get: "/album_collection"
      body: "*"
    };
  }
  rpc GetArtistsCollection(GetArtistsRequest) returns (GetArtistsResponse) {
    option (google.api.http) = {
      get: "/artist_collection"
      body: "*"
    };
  }
  rpc DeleteTrackCollection(DeleteTrackRequest) returns (DeleteTrackResponse) {
    option (google.api.http) = {
      delete: "/track_collection/{trackId}"
      body: "*"
    };
  }
  rpc DeleteAlbumCollection(DeleteAlbumRequest) returns (DeleteAlbumResponse) {
    option (google.api.http) = {
      delete: "/album_collection/{albumId}"
      body: "*"
    };
  }
  rpc DeleteArtistCollection(DeleteArtistRequest) returns (DeleteArtistResponse) {
    option (google.api.http) = {
      delete: "/artist_collection/{artistId}"
      body: "*"
    };
  }

  rpc AddAlbumCollection(AddAlbumRequest) returns (AddAlbumResponse) {
    option (google.api.http) = {
      post: "/album_collection"
      body: "*"
    };
  }
  rpc AddArtistCollection(AddArtistRequest) returns (AddArtistResponse) {
    option (google.api.http) = {
      post: "/artist_collection"
      body: "*"
    };
  }
  rpc AddTrackCollection(AddTrackRequest) returns (AddTrackResponse) {
    option (google.api.http) = {
      post: "/track_collection"
      body: "*"
    };
  }
}

message AlbumCollection {
  int64 userId = 1;
  repeated int64 albumId = 2;
}

message ArtistCollection {
  int64 userId = 1;
  repeated int64 artistId = 2;
}

message TrackCollection {
  int64 userId = 1;
  repeated int64 trackId = 2;
}

message PlaylistCollection {
  int64 userId = 1;
  repeated int64 playlistId = 2;
}

message AddAlbumToCollectionRequest {
  int64 userId = 1;
  int64 albumId = 2;
}

message AddAlbumToCollectionResponse {
  int64 albumId = 1;
}

message AddArtistToCollectionRequest {
  int64 userId = 1;
  int64 artistId = 2;
}

message AddArtistToCollectionResponse {
  int64 artistId = 1;
}

message AddTrackToCollectionRequest {
  int64 userId = 1;
  int64 trackId = 2;
}

message AddTrackToCollectionResponse {
  int64 trackId = 1;
}

message AddPlaylistToCollectionRequest {
  int64 userId = 1;
  int64 playlistId = 2;
}

message AddPlaylistToCollectionResponse {
  int64 playlistId = 1;
}

message RemoveAlbumFromCollectionRequest {
  int64 userId = 1;
  int64 albumId = 2;
}

message RemoveAlbumFromCollectionResponse {
  int64 albumId = 1;
}

message RemoveArtistFromCollectionRequest {
  int64 userId = 1;
  int64 artistId = 2;
}

message RemoveArtistFromCollectionResponse {
  int64 artistId = 1;
}

message RemoveTrackFromCollectionRequest {
  int64 userId = 1;
  int64 trackId = 2;
}

message RemoveTrackFromCollectionResponse {
  int64 trackId = 1;
}

message RemovePlaylistFromCollectionRequest {
  int64 userId = 1;
  int64 playlistId = 2;
}

message RemovePlaylistFromCollectionResponse {
  int64 playlistId = 1;
}
