syntax = "proto3";

package request;

option go_package = "collection-service/proto/request;request";

// Album requests
message GetAlbumsRequest {
  int64 user_id = 1;
}

message AddAlbumRequest {
  int64 user_id = 1;
  int64 album_id = 2;
}

message DeleteAlbumRequest {
  int64 user_id = 1;
  int64 album_id = 2;
}

// Artist requests
message AddArtistRequest {
  int64 user_id = 1;
  int64 artist_id = 2;
}

message GetArtistsRequest {
  int64 user_id = 1;
}

message DeleteArtistRequest {
  int64 user_id = 1;
  int64 artist_id = 2;
}

// Track requests
message AddTrackRequest {
  int64 user_id = 1;
  int64 track_id = 2;
}

message GetTracksRequest {
  int64 user_id = 1;
}

message DeleteTrackRequest {
  int64 user_id = 1;
  int64 track_id = 2;
}
